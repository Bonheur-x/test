<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>测测你最像24节气中的哪个节气</title>
<style>
/* ===== Reset & Base ===== */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg: #f7f3eb;
  --card-bg: #fffef9;
  --text: #3d3226;
  --text-light: #8b7e6a;
  --text-lighter: #b5a898;
  --accent: #b5343a;
  --accent-hover: #9a2c31;
  --accent-light: #fdf5f5;
  --border: #e5dcd0;
  --border-light: #f0ebe0;
  --shadow: 0 4px 24px rgba(60, 40, 20, 0.08);
  --radius: 16px;
  --radius-sm: 10px;
  /* Growth stage colors */
  --soil: #8b6914;
  --soil-dark: #5c4510;
  --stem-green: #6b9b4f;
  --leaf-green: #7bab5b;
  --leaf-fall: #c9984a;
  --flower: #f0a0b0;
  --fruit: #d4735e;
  --snow: #e8eef4;
}

body {
  font-family: "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", "微软雅黑", sans-serif;
  background: linear-gradient(180deg, #f5efe4 0%, #ede4d5 30%, #f0e8d8 60%, #f5efe4 100%);
  background-attachment: fixed;
  min-height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 20px;
  color: var(--text);
  -webkit-tap-highlight-color: transparent;
  user-select: none;
}

body::before {
  content: '';
  position: fixed;
  inset: 0;
  background:
    radial-gradient(ellipse at 20% 20%, rgba(180, 140, 100, 0.06) 0%, transparent 60%),
    radial-gradient(ellipse at 80% 70%, rgba(140, 160, 180, 0.05) 0%, transparent 60%),
    radial-gradient(ellipse at 50% 50%, rgba(200, 180, 150, 0.04) 0%, transparent 70%);
  pointer-events: none;
  z-index: 0;
}

.container { width: 100%; max-width: 500px; position: relative; z-index: 1; }

/* ===== Card ===== */
.card {
  background: var(--card-bg);
  border-radius: var(--radius);
  box-shadow: var(--shadow);
  padding: 40px 32px 32px;
  border: 1px solid var(--border);
  position: relative;
  overflow: hidden;
  transition: padding 0.3s;
}

.card::before {
  content: '';
  position: absolute;
  top: 0; left: 0; right: 0;
  height: 4px;
  background: linear-gradient(90deg, #cbb99a, #b5343a, #cbb99a);
  opacity: 0.5;
}

/* ===== Screen visibility ===== */
.screen { display: none; }
.screen.active { display: block; animation: fadeIn 0.5s ease; }

@keyframes fadeIn {
  from { opacity: 0; transform: translateY(12px); }
  to { opacity: 1; transform: translateY(0); }
}

@keyframes slideInRight {
  from { opacity: 0; transform: translateX(30px); }
  to { opacity: 1; transform: translateX(0); }
}

/* ===== Home Screen ===== */
.home-header { text-align: center; margin-bottom: 8px; }

/* CSS Seed */
.seed-container {
  width: 64px; height: 72px;
  margin: 0 auto 12px;
  position: relative;
  animation: seedFloat 3s ease-in-out infinite;
}

@keyframes seedFloat {
  0%, 100% { transform: translateY(0); }
  50% { transform: translateY(-8px); }
}

.seed-body {
  position: absolute;
  bottom: 0; left: 50%;
  transform: translateX(-50%);
  width: 36px; height: 46px;
  background: linear-gradient(135deg, #c49a3c 0%, #a07828 40%, #8b6914 100%);
  border-radius: 50% 50% 50% 50% / 60% 60% 40% 40%;
  box-shadow: inset 0 -4px 6px rgba(0,0,0,0.2), 0 2px 8px rgba(100, 70, 20, 0.3);
}

.seed-body::after {
  content: '';
  position: absolute;
  top: 6px; left: 8px;
  width: 10px; height: 14px;
  background: rgba(255,255,255,0.15);
  border-radius: 50%;
  transform: rotate(-20deg);
}

.seed-line {
  position: absolute;
  top: 50%; left: 10%;
  width: 80%; height: 1px;
  background: rgba(0,0,0,0.2);
  border-radius: 1px;
}

.seed-soil {
  position: absolute;
  bottom: -2px; left: 50%;
  transform: translateX(-50%);
  width: 48px; height: 8px;
  background: var(--soil);
  border-radius: 50%;
  opacity: 0.4;
}

/* Seed drop animation */
@keyframes seedDrop {
  0% { transform: translateY(0); opacity: 1; }
  30% { transform: translateY(20px) rotate(15deg); opacity: 1; }
  100% { transform: translateY(120px) rotate(45deg); opacity: 0; }
}

.seed-container.dropping {
  animation: seedDrop 0.8s ease-in forwards;
}

.home-title {
  font-family: "STKaiti", "KaiTi", "楷体", "Noto Serif SC", serif;
  font-size: 28px;
  font-weight: 700;
  color: var(--text);
  line-height: 1.4;
  letter-spacing: 2px;
}

.home-subtitle {
  font-size: 15px;
  color: var(--text-light);
  margin: 12px 0 4px;
  line-height: 1.6;
}

.home-version-note {
  font-size: 12px;
  color: #c9984a;
  background: #fef9f0;
  display: inline-block;
  padding: 4px 14px;
  border-radius: 50px;
  margin-bottom: 6px;
  letter-spacing: 0.5px;
}

.home-decoration {
  display: flex;
  justify-content: center;
  gap: 10px;
  font-size: 16px;
  margin-bottom: 28px;
  opacity: 0.6;
}

.season-dot {
  width: 8px; height: 8px;
  border-radius: 50%;
  display: inline-block;
}
.season-dot.spring { background: #7bab7b; }
.season-dot.summer { background: #d4735e; }
.season-dot.autumn { background: #c9984a; }
.season-dot.winter { background: #5f8aa8; }

.home-modes {
  display: flex;
  flex-direction: column;
  gap: 12px;
}

.mode-card {
  display: flex;
  align-items: center;
  gap: 14px;
  padding: 16px 18px;
  border: 1.5px solid var(--border);
  border-radius: var(--radius-sm);
  cursor: pointer;
  transition: all 0.2s;
  background: #fefdf9;
  text-align: left;
}

.mode-card:hover {
  border-color: #cbb99a;
  background: #fdf9f2;
  transform: translateY(-1px);
  box-shadow: 0 2px 12px rgba(60, 40, 20, 0.06);
}

.mode-card:active { transform: scale(0.985); }

.mode-card-icon { font-size: 28px; flex-shrink: 0; width: 44px; text-align: center; }

.mode-card-info { flex: 1; }

.mode-card-title { font-size: 16px; font-weight: 600; color: var(--text); margin-bottom: 2px; }

.mode-card-desc { font-size: 12px; color: var(--text-light); }

.mode-card-badge {
  font-size: 11px;
  padding: 3px 10px;
  border-radius: 50px;
  font-weight: 500;
  flex-shrink: 0;
}
.mode-card-badge.simple { background: #f0ebe0; color: #8b7e6a; }
.mode-card-badge.detailed { background: #fdf5f5; color: #b5343a; }

/* ===== Buttons ===== */
.btn {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  gap: 6px;
  padding: 13px 28px;
  border: none;
  border-radius: 50px;
  font-size: 15px;
  font-weight: 600;
  cursor: pointer;
  transition: all 0.25s;
  font-family: inherit;
  letter-spacing: 0.5px;
}

.btn-primary {
  background: var(--accent);
  color: #fff;
  box-shadow: 0 4px 16px rgba(181, 52, 58, 0.3);
}
.btn-primary:hover {
  background: var(--accent-hover);
  transform: translateY(-2px);
  box-shadow: 0 6px 20px rgba(181, 52, 58, 0.4);
}
.btn-primary:active { transform: translateY(0); }
.btn-primary:disabled { opacity: 0.4; cursor: not-allowed; box-shadow: none; }
.btn-primary:disabled:hover { transform: none; background: var(--accent); }

.btn-outline {
  background: transparent;
  color: var(--text);
  border: 1.5px solid var(--border);
}
.btn-outline:hover {
  border-color: var(--accent);
  color: var(--accent);
  background: rgba(181, 52, 58, 0.04);
}

.btn-ghost {
  background: transparent;
  color: var(--text-light);
  border: 1px dashed var(--border);
  font-size: 13px;
  padding: 8px 18px;
}
.btn-ghost:hover { border-color: #cbb99a; color: var(--text); background: #fdf9f2; }
.btn-ghost.active { border-style: solid; border-color: #c9984a; color: #b8860b; background: #fef9f0; }

.btn-block { width: 100%; }

/* ===== Quiz Screen ===== */
.quiz-header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 6px;
}

.quiz-mode-tag {
  font-size: 11px;
  padding: 2px 10px;
  border-radius: 50px;
  font-weight: 500;
  letter-spacing: 1px;
}

.quiz-progress-wrap { margin-bottom: 20px; }

.quiz-progress-info {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 6px;
  font-size: 12px;
  color: var(--text-light);
}

.quiz-progress-bar {
  width: 100%;
  height: 5px;
  background: #e8e0d5;
  border-radius: 3px;
  overflow: hidden;
}

.quiz-progress-fill {
  height: 100%;
  background: linear-gradient(90deg, #cbb99a, #b5343a);
  border-radius: 3px;
  transition: width 0.4s ease;
}

.quiz-question-wrap { min-height: 220px; }

.quiz-question { animation: slideInRight 0.35s ease; }

.quiz-question-num {
  font-size: 12px;
  color: var(--text-lighter);
  margin-bottom: 8px;
  letter-spacing: 1px;
}

.quiz-question-text {
  font-size: 19px;
  font-weight: 600;
  line-height: 1.5;
  margin-bottom: 18px;
  color: var(--text);
}

.quiz-options { display: flex; flex-direction: column; gap: 9px; }

.quiz-option {
  display: flex;
  align-items: center;
  gap: 12px;
  padding: 13px 16px;
  border: 1.5px solid var(--border);
  border-radius: var(--radius-sm);
  background: #fefdf9;
  cursor: pointer;
  transition: all 0.2s;
  font-size: 14px;
  text-align: left;
  font-family: inherit;
  color: var(--text);
  line-height: 1.5;
}

.quiz-option:hover { border-color: #cbb99a; background: #fdf9f2; }
.quiz-option:active { transform: scale(0.985); }

.quiz-option.selected {
  border-color: var(--accent);
  background: var(--accent-light);
  box-shadow: 0 0 0 3px rgba(181, 52, 58, 0.06);
}
.quiz-option.selected .option-indicator { background: var(--accent); color: #fff; border-color: var(--accent); }

.quiz-option.multi-selected {
  border-color: #c9984a;
  background: #fef9f0;
}
.quiz-option.multi-selected .option-indicator { background: #c9984a; color: #fff; border-color: #c9984a; }

.option-indicator {
  width: 28px; height: 28px;
  border-radius: 50%;
  border: 1.5px solid var(--border);
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 12px;
  font-weight: 700;
  flex-shrink: 0;
  transition: all 0.2s;
  color: var(--text-lighter);
  background: #faf7f2;
}

.option-text { flex: 1; }

.quiz-multi-toggle { margin-top: 14px; text-align: center; }

/* Quiz nav */
.quiz-nav {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-top: 20px;
  gap: 12px;
}
.quiz-nav .btn { min-width: 90px; }
.quiz-counter { font-size: 12px; color: var(--text-lighter); white-space: nowrap; }

/* ===== Growth Animation Area ===== */
.growth-area {
  margin-top: 18px;
  padding-top: 4px;
  border-top: 1px solid var(--border-light);
}

.growth-label {
  font-size: 11px;
  color: var(--text-lighter);
  text-align: center;
  margin-bottom: 4px;
  letter-spacing: 1px;
}

.growth-scene {
  width: 100%;
  height: 56px;
  position: relative;
  overflow: hidden;
}

/* Soil */
.growth-soil {
  position: absolute;
  bottom: 0; left: 0; right: 0;
  height: 10px;
  background: linear-gradient(180deg, #c4a86c 0%, #8b6914 100%);
  border-radius: 3px 3px 0 0;
}

/* Plant container — centered on soil */
.growth-plant {
  position: absolute;
  bottom: 9px;
  left: 50%;
  transform: translateX(-50%);
  width: 60px;
  height: 44px;
}

/* Stem */
.growth-stem {
  position: absolute;
  bottom: 0;
  left: 50%;
  transform: translateX(-50%);
  width: 3px;
  background: var(--stem-green);
  border-radius: 2px;
  transition: height 0.5s ease;
}
.growth-stem.winter-stem { background: #8b7355; }

/* Leaf */
.growth-leaf {
  position: absolute;
  width: 14px;
  height: 8px;
  background: var(--leaf-green);
  border-radius: 0 70% 0 70%;
  transition: all 0.5s ease;
}
.growth-leaf.left { border-radius: 70% 0 70% 0; }
.growth-leaf.fall { background: #c9984a; }
.growth-leaf.bare { opacity: 0; }

/* Flower */
.growth-flower {
  position: absolute;
  width: 16px; height: 16px;
  background: var(--flower);
  border-radius: 50%;
  transition: all 0.5s ease;
  box-shadow: 0 0 6px rgba(240, 160, 176, 0.5);
}
.growth-flower::before {
  content: '';
  position: absolute;
  top: 50%; left: 50%;
  transform: translate(-50%, -50%);
  width: 6px; height: 6px;
  background: #f5d34a;
  border-radius: 50%;
}

/* Fruit */
.growth-fruit {
  position: absolute;
  width: 10px; height: 10px;
  background: var(--fruit);
  border-radius: 50%;
  transition: all 0.5s ease;
}

/* Snow overlay */
.growth-snow {
  position: absolute;
  bottom: 0; left: 0; right: 0;
  background: rgba(220, 230, 240, 0.7);
  transition: height 0.5s ease;
  border-radius: 2px 2px 0 0;
}

/* Snow particles */
.growth-snow-particle {
  position: absolute;
  width: 3px; height: 3px;
  background: #d0dce8;
  border-radius: 50%;
  opacity: 0;
  transition: opacity 0.5s ease;
}

/* Seed underground (stage 0) */
.growth-seed-underground {
  position: absolute;
  bottom: 2px;
  left: 50%;
  transform: translateX(-50%);
  width: 12px; height: 8px;
  background: #a07828;
  border-radius: 50%;
  transition: all 0.5s ease;
}

/* Tiny sprout */
.growth-sprout {
  position: absolute;
  bottom: 8px;
  left: 50%;
  transform: translateX(-50%);
  width: 2px;
  background: #8fbc6b;
  border-radius: 1px;
  transition: height 0.5s ease;
}

/* Dew drop */
.growth-dew {
  position: absolute;
  width: 5px; height: 5px;
  background: rgba(180, 210, 240, 0.7);
  border-radius: 50%;
  transition: opacity 0.5s ease;
}

/* Stage label */
.growth-stage-label {
  font-size: 10px;
  color: var(--text-lighter);
  text-align: center;
  margin-top: 4px;
  letter-spacing: 2px;
}

/* ===== Result Screen ===== */
.result-wrap { text-align: center; position: relative; z-index: 1; }

.result-accuracy {
  display: inline-block;
  padding: 5px 14px;
  border-radius: 50px;
  font-size: 11px;
  font-weight: 600;
  letter-spacing: 1px;
  margin-bottom: 14px;
}

.result-season-badge {
  display: inline-block;
  padding: 6px 16px;
  border-radius: 50px;
  font-size: 12px;
  font-weight: 600;
  letter-spacing: 2px;
  margin-bottom: 12px;
}

/* Result illustration — CSS plant matching the solar term */
.result-illustration {
  width: 100px; height: 100px;
  margin: 0 auto 8px;
  position: relative;
  animation: seedFloat 3s ease-in-out infinite;
}

.result-term-name {
  font-family: "STKaiti", "KaiTi", "楷体", "Noto Serif SC", serif;
  font-size: 40px;
  font-weight: 700;
  letter-spacing: 4px;
  margin-bottom: 2px;
}

.result-term-sub {
  font-size: 13px;
  color: var(--text-light);
  margin-bottom: 18px;
  letter-spacing: 1px;
}

.result-divider {
  width: 48px;
  height: 2px;
  background: var(--border);
  margin: 0 auto 18px;
  border-radius: 1px;
}

.result-traits {
  display: flex;
  flex-wrap: wrap;
  justify-content: center;
  gap: 8px;
  margin-bottom: 18px;
}

.result-trait {
  padding: 5px 14px;
  border-radius: 50px;
  font-size: 13px;
  font-weight: 500;
  letter-spacing: 1px;
}

.result-description {
  font-size: 15px;
  line-height: 1.8;
  color: var(--text);
  margin-bottom: 6px;
  text-align: left;
}

.result-poem {
  font-family: "STKaiti", "KaiTi", "楷体", "Noto Serif SC", serif;
  font-size: 15px;
  color: var(--text-light);
  font-style: italic;
  margin-bottom: 24px;
  line-height: 1.6;
}

.result-actions { display: flex; flex-direction: column; gap: 10px; }

.result-share-hint { font-size: 12px; color: var(--text-lighter); margin-top: 2px; }

/* Season distribution mini chart */
.result-distribution { margin-bottom: 20px; text-align: left; }

.result-distribution-title {
  font-size: 12px;
  color: var(--text-lighter);
  margin-bottom: 8px;
  letter-spacing: 1px;
}

.dist-bar-wrap { display: flex; align-items: center; gap: 8px; margin-bottom: 6px; }

.dist-bar-label { width: 28px; font-size: 12px; color: var(--text-light); text-align: right; flex-shrink: 0; }

.dist-bar-track { flex: 1; height: 8px; background: #f0ebe0; border-radius: 4px; overflow: hidden; }

.dist-bar-fill { height: 100%; border-radius: 4px; transition: width 0.8s ease; }
.dist-bar-fill.spring { background: #7bab7b; }
.dist-bar-fill.summer { background: #d4735e; }
.dist-bar-fill.autumn { background: #c9984a; }
.dist-bar-fill.winter { background: #5f8aa8; }

.dist-bar-pct { width: 32px; font-size: 11px; color: var(--text-lighter); text-align: right; flex-shrink: 0; }

/* ===== Toast ===== */
.toast {
  position: fixed;
  top: 24px;
  left: 50%;
  transform: translateX(-50%);
  background: #3d3226;
  color: #fff;
  padding: 10px 24px;
  border-radius: 50px;
  font-size: 14px;
  z-index: 100;
  animation: toastIn 0.3s ease, toastOut 0.3s ease 1.7s forwards;
  pointer-events: none;
  white-space: nowrap;
}

@keyframes toastIn {
  from { opacity: 0; transform: translateX(-50%) translateY(-10px); }
  to { opacity: 1; transform: translateX(-50%) translateY(0); }
}
@keyframes toastOut {
  from { opacity: 1; } to { opacity: 0; }
}

/* ===== Responsive ===== */
@media (max-width: 480px) {
  .card { padding: 28px 18px 24px; border-radius: 12px; }
  .home-title { font-size: 23px; }
  .seed-container { width: 52px; height: 60px; }
  .seed-body { width: 28px; height: 36px; }
  .seed-soil { width: 38px; }
  .quiz-question-text { font-size: 17px; }
  .quiz-option { padding: 11px 13px; font-size: 13px; }
  .result-term-name { font-size: 32px; }
  .result-illustration { width: 80px; height: 80px; }
  .result-description { font-size: 14px; }
  .mode-card { padding: 14px; }
  .mode-card-title { font-size: 15px; }
  .btn { padding: 11px 22px; font-size: 14px; }
  .growth-scene { height: 48px; }
}

@media (min-width: 768px) {
  .card { padding: 48px 40px 36px; }
  .home-title { font-size: 30px; }
}

@media (prefers-reduced-motion: reduce) {
  *, *::before, *::after {
    animation-duration: 0.01ms !important;
    transition-duration: 0.01ms !important;
  }
}
</style>
</head>
<body>

<div class="container">
  <div class="card" id="card">

    <!-- ===== HOME SCREEN ===== -->
    <div class="screen active" id="screen-home">
      <div class="home-header">
        <!-- CSS Seed -->
        <div class="seed-container" id="home-seed">
          <div class="seed-body">
            <div class="seed-line"></div>
          </div>
          <div class="seed-soil"></div>
        </div>

        <h1 class="home-title">测测你最像<br>24节气中的哪个节气</h1>
        <p class="home-subtitle">
          春生夏长，秋收冬藏<br>
          每个节气都有独特的性格密码
        </p>
        <p class="home-version-note">
          <!-- ⚠️ 精简版与详细版测试结果可能存在出入 -->
        </p>
        <div class="home-decoration">
          <span class="season-dot spring"></span>
          <span class="season-dot summer"></span>
          <span class="season-dot autumn"></span>
          <span class="season-dot winter"></span>
        </div>
      </div>

      <div class="home-modes">
        <div class="mode-card" onclick="startQuiz('simple')">
          <!-- <div class="mode-card-icon">⚡</div> -->
          <div class="mode-card-info">
            <div class="mode-card-title">精简版 · 10 题</div>
            <div class="mode-card-desc">快速了解你的节气人格</div>
          </div>
          <span class="mode-card-badge simple">约 2 分钟</span>
        </div>

        <div class="mode-card" onclick="startQuiz('detailed')">
          <!-- <div class="mode-card-icon">🔍</div> -->
          <div class="mode-card-info">
            <div class="mode-card-title">详细版 · 25 题</div>
            <div class="mode-card-desc">更精准深入的节气分析</div>
          </div>

// ===== STATE =====
let currentQuestion = 0;
let answers = [];
let selectedOptions = new Set();
let isMultiSelect = false;
let quizMode = null;
let questionSet = [];
let shuffledOptions = [];

// ===== SCREEN MANAGEMENT =====
function showScreen(id) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById('screen-' + id).classList.add('active');
}

// ===== START QUIZ =====
function startQuiz(mode) {
  quizMode = mode;
  currentQuestion = 0;
  answers = [];
  selectedOptions = new Set();
  isMultiSelect = false;

  if (mode === 'simple') {
    questionSet = allQuestions.filter(q => q.simple);
  } else {
    questionSet = [...allQuestions];
  }

  // Update mode tag
  const tag = document.getElementById('quiz-mode-tag');
  if (mode === 'simple') {
    tag.textContent = '⚡ 精简版';
    tag.style.background = '#f0ebe0';
    tag.style.color = '#8b7e6a';
    document.getElementById('quiz-accuracy-note').textContent = '结果仅供参考';
  } else {
    tag.textContent = '🔍 详细版';
    tag.style.background = '#fdf5f5';
    tag.style.color = '#b5343a';
    document.getElementById('quiz-accuracy-note').textContent = '';
  }

  // Reset multi-select toggle
  document.getElementById('btn-multi-toggle').classList.remove('active');
  document.getElementById('btn-multi-toggle').textContent = '🔀 我要多选';

  // Seed drop animation on home screen
  const seed = document.getElementById('home-seed');
  seed.classList.add('dropping');
  setTimeout(() => {
    seed.classList.remove('dropping');
    showScreen('quiz');
    renderQuestion();
    updateGrowthStage(0);
  }, 500);
}

// ===== GROWTH STAGE ANIMATION =====
// 24 stages: 0=seed underground ... 23=deep winter
function updateGrowthStage(questionIndex) {
  const total = questionSet.length;
  // Map question progress (0..total-1) to growth stage (0..23)
  const stage = total > 1 ? Math.round((questionIndex / (total - 1)) * 23) : 0;

  // Show stage label (节气 name)
  const allTerms = [
    ...solarTerms.spring, ...solarTerms.summer,
    ...solarTerms.autumn, ...solarTerms.winter
  ];
  document.getElementById('growth-stage-label').textContent = allTerms[stage].name;

  // Plant elements
  const stem = document.getElementById('growth-stem');
  const sprout = document.getElementById('growth-sprout');
  const seedEl = document.getElementById('growth-seed');
  const flower = document.getElementById('growth-flower');
  const fruit = document.getElementById('growth-fruit');
  const dew = document.getElementById('growth-dew');
  const snow = document.getElementById('growth-snow');
  const leaves = [
    document.getElementById('growth-leaf-l1'),
    document.getElementById('growth-leaf-r1'),
    document.getElementById('growth-leaf-l2'),
    document.getElementById('growth-leaf-r2')
  ];
  const snowP = [
    document.getElementById('growth-snow-p1'),
    document.getElementById('growth-snow-p2'),
    document.getElementById('growth-snow-p3')
  ];

  const stageMap = stage; // 0-23

  // ── Stage 0-5: Spring (seed → sprout → seedling) ──
  if (stageMap <= 5) {
    // Stem grows 0→40%
    const stemH = (stageMap / 5) * 40;
    stem.style.height = stemH + '%';
    stem.style.background = '#6b9b4f';
    stem.classList.remove('winter-stem');
    sprout.style.height = stageMap <= 1 ? (stageMap * 4 + 'px') : '0px';
    sprout.style.opacity = stageMap <= 1 ? 1 : 0;
    seedEl.style.opacity = stageMap <= 1 ? 1 : 0;
    seedEl.style.width = stageMap === 0 ? '12px' : '8px';
    flower.style.opacity = '0';
    fruit.style.opacity = '0';
    dew.style.opacity = stageMap === 1 ? 1 : 0;
    snow.style.height = '0';
    snowP.forEach(p => p.style.opacity = '0');
    // Leaves appear at stages 3-5
    leaves.forEach((l, i) => {
      l.style.opacity = stageMap >= 3 + i ? '1' : '0';
      l.classList.remove('fall', 'bare');
    });
    updateLeafPositions(stageMap <= 5 ? stageMap / 5 : 1);
  }
  // ── Stage 6-11: Summer (growing → blooming → fruiting) ──
  else if (stageMap <= 11) {
    const prog = (stageMap - 6) / 5; // 0→1 within summer
    const stemH = 40 + prog * 55;
    stem.style.height = stemH + '%';
    stem.style.background = '#6b9b4f';
    stem.classList.remove('winter-stem');
    sprout.style.opacity = '0';
    seedEl.style.opacity = '0';
    snow.style.height = '0';
    snowP.forEach(p => p.style.opacity = '0');
    dew.style.opacity = stageMap === 6 ? 0.6 : 0;
    // All leaves visible
    leaves.forEach(l => { l.style.opacity = '1'; l.classList.remove('fall', 'bare'); });
    updateLeafPositions(1);
    // Flower: buds at 8-9, bloom at 10, fade at 11
    if (stageMap <= 7) { flower.style.opacity = '0'; flower.style.transform = 'scale(0.5)'; }
    else if (stageMap <= 9) { flower.style.opacity = '0.6'; flower.style.transform = 'scale(0.8)'; }
    else if (stageMap === 10) { flower.style.opacity = '1'; flower.style.transform = 'scale(1)'; }
    else { flower.style.opacity = '0.4'; flower.style.transform = 'scale(1.1)'; }
    // Fruit: appears at 11
    fruit.style.opacity = stageMap >= 11 ? '1' : '0';
    if (stageMap >= 11) { fruit.style.transform = 'scale(0.7)'; }
  }
  // ── Stage 12-17: Autumn (ripening → yellowing → falling) ──
  else if (stageMap <= 17) {
    const prog = (stageMap - 12) / 5; // 0→1 within autumn
    stem.style.height = '95%';
    stem.style.background = prog > 0.6 ? '#8b7355' : '#6b9b4f';
    stem.classList.toggle('winter-stem', prog > 0.6);
    sprout.style.opacity = '0';
    seedEl.style.opacity = '0';
    flower.style.opacity = '0';
    snow.style.height = '0';
    snowP.forEach(p => p.style.opacity = '0');
    dew.style.opacity = stageMap === 14 ? 1 : 0; // 白露 dew
    // Fruit ripens and drops
    fruit.style.opacity = stageMap <= 16 ? '1' : '0.3';
    fruit.style.transform = stageMap <= 15 ? 'scale(1)' : stageMap === 16 ? 'scale(1.2)' : 'scale(0.6)';
    // Leaves turn yellow and fall
    const fallStart = 13; // 立秋开始变黄
    leaves.forEach((l, i) => {
      if (stageMap < fallStart) {
        l.style.opacity = '1'; l.classList.remove('fall', 'bare');
      } else if (stageMap < fallStart + 2) {
        l.style.opacity = '1'; l.classList.add('fall'); l.classList.remove('bare');
      } else if (stageMap < fallStart + 4) {
        l.style.opacity = i < 2 ? '0.5' : '1'; l.classList.add('fall'); l.classList.remove('bare');
      } else {
        l.style.opacity = i < 3 ? '0' : '0.4'; l.classList.add('fall');
        if (i < 3) l.classList.add('bare');
      }
    });
  }
  // ── Stage 18-23: Winter (bare → frost → snow → ice → cycle) ──
  else {
    const prog = (stageMap - 18) / 5; // 0→1 within winter
    stem.style.height = '90%';
    stem.style.background = '#8b7355';
    stem.classList.add('winter-stem');
    sprout.style.opacity = '0';
    seedEl.style.opacity = stageMap === 23 ? 0.8 : 0; // 大寒: seed visible underground for next cycle
    seedEl.style.width = '8px';
    flower.style.opacity = '0';
    fruit.style.opacity = '0';
    dew.style.opacity = '0';
    // Bare branches
    leaves.forEach((l, i) => {
      l.style.opacity = '0'; l.classList.add('bare');
    });
    // Snow accumulation
    const snowH = Math.min(prog * 50, 40);
    snow.style.height = snowH + '%';
    // Snow particles
    snowP.forEach((p, i) => {
      p.style.opacity = prog > i * 0.15 ? Math.min((prog - i * 0.15) * 2, 0.8) : 0;
      p.style.left = (30 + i * 20 + Math.sin(stageMap + i) * 15) + '%';
      p.style.top = (10 + i * 25) + '%';
    });
  }
}

function updateLeafPositions(scale) {
  // Position leaves along stem based on growth scale (0-1)
  const leaves = [
    document.getElementById('growth-leaf-l1'),
    document.getElementById('growth-leaf-r1'),
    document.getElementById('growth-leaf-l2'),
    document.getElementById('growth-leaf-r2')
  ];
  const positions = [
    { bottom: 25 + scale * 20 + '%', left: 20 + '%' },
    { bottom: 35 + scale * 18 + '%', right: 20 + '%' },
    { bottom: 48 + scale * 15 + '%', left: 22 + '%' },
    { bottom: 58 + scale * 12 + '%', right: 22 + '%' }
  ];
  leaves.forEach((l, i) => {
    l.style.bottom = positions[i].bottom;
    if (positions[i].left) l.style.left = positions[i].left;
    if (positions[i].right) l.style.right = positions[i].right;
  });
}

// ===== RENDER QUESTION =====
function renderQuestion() {
  const q = questionSet[currentQuestion];
  selectedOptions = new Set();
  isMultiSelect = false;

  document.getElementById('btn-multi-toggle').classList.remove('active');
  document.getElementById('btn-multi-toggle').textContent = '🔀 我要多选';

  const indexed = q.options.map((opt, i) => ({ ...opt, origIndex: i }));
  shuffledOptions = shuffle(indexed);

  const total = questionSet.length;
  document.getElementById('quiz-progress-label').textContent =
    `第 ${currentQuestion + 1}/${total} 题`;
  document.getElementById('quiz-progress-fill').style.width =
    `${(currentQuestion / total) * 100}%`;

  const wrap = document.getElementById('quiz-question-wrap');
  const labels = ['A', 'B', 'C', 'D'];

  wrap.innerHTML = `
    <div class="quiz-question">
      <div class="quiz-question-num">QUESTION ${currentQuestion + 1}</div>
      <div class="quiz-question-text">${q.text}</div>
      <div class="quiz-options">
        ${shuffledOptions.map((opt, i) => `
          <button class="quiz-option" data-idx="${i}" onclick="selectOption(${i}, this)">
            <span class="option-indicator">${labels[i]}</span>
            <span class="option-text">${opt.text}</span>
          </button>
        `).join('')}
      </div>
    </div>
  `;

  updateNavButtons();
}

// ===== SELECT / TOGGLE / NAV =====
function selectOption(index, el) {
  if (isMultiSelect) {
    if (selectedOptions.has(index)) {
      selectedOptions.delete(index);
      el.classList.remove('multi-selected');
    } else {
      selectedOptions.add(index);
      el.classList.add('multi-selected');
    }
  } else {
    document.querySelectorAll('.quiz-option').forEach(o => o.classList.remove('selected'));
    selectedOptions.clear();
    selectedOptions.add(index);
    el.classList.add('selected');
  }
  updateNavButtons();
}

function toggleMultiSelect() {
  isMultiSelect = !isMultiSelect;
  const btn = document.getElementById('btn-multi-toggle');
  if (isMultiSelect) {
    btn.classList.add('active');
    btn.textContent = '🔀 返回单选';
    if (selectedOptions.size === 1) {
      const idx = [...selectedOptions][0];
      const el = document.querySelector(`.quiz-option[data-idx="${idx}"]`);
      if (el) { el.classList.remove('selected'); el.classList.add('multi-selected'); }
    }
  } else {
    btn.classList.remove('active');
    btn.textContent = '🔀 我要多选';
    document.querySelectorAll('.quiz-option').forEach(o => {
      o.classList.remove('multi-selected', 'selected');
    });
    selectedOptions.clear();
  }
  updateNavButtons();
}

function updateNavButtons() {
  const btnNext = document.getElementById('btn-next');
  const btnPrev = document.getElementById('btn-prev');
  const counter = document.getElementById('quiz-counter');
  const total = questionSet.length;
  btnNext.disabled = selectedOptions.size === 0;
  btnNext.textContent = currentQuestion === total - 1 ? '查看结果 ✨' : (isMultiSelect ? '下一题（多选）→' : '下一题 →');
  btnPrev.style.visibility = currentQuestion === 0 ? 'hidden' : 'visible';
  counter.textContent = `${currentQuestion + 1} / ${total}`;
}

function nextQuestion() {
  if (selectedOptions.size === 0) return;
  const seasons = [...selectedOptions].map(i => shuffledOptions[i].season);
  const weight = 1.0 / seasons.length;
  answers.push({ seasons, weight });

  const total = questionSet.length;
  if (currentQuestion < total - 1) {
    currentQuestion++;
    renderQuestion();
    updateGrowthStage(currentQuestion);
  } else {
    updateGrowthStage(total - 1);
    showResult();
  }
}

function prevQuestion() {
  if (currentQuestion === 0) return;
  currentQuestion--;
  answers.pop();
  renderQuestion();
  document.getElementById('quiz-progress-fill').style.width =
    `${(currentQuestion / questionSet.length) * 100}%`;
  updateGrowthStage(currentQuestion);
}

// ===== RESULT CALCULATION =====
function calculateResult() {
  const scores = { spring: 0, summer: 0, autumn: 0, winter: 0 };
  let multiSelectCount = 0;
  answers.forEach(a => {
    a.seasons.forEach(s => { scores[s] += a.weight; });
    if (a.seasons.length > 1) multiSelectCount++;
  });

  let topSeason = 'spring';
  let topScore = 0;
  for (const [season, score] of Object.entries(scores)) {
    if (score > topScore) { topScore = score; topSeason = season; }
  }

  const tied = Object.entries(scores).filter(([s, v]) => v === topScore && s !== topSeason);
  if (tied.length > 0) {
    for (const a of answers) {
      for (const s of a.seasons) {
        if (s === topSeason || tied.some(([ts]) => ts === s)) { topSeason = s; break; }
      }
      if (topSeason !== 'spring' || tied.some(([ts]) => ts === 'spring')) break;
    }
  }

  // Normalize scores
  const totalScore = scores.spring + scores.summer + scores.autumn + scores.winter;
  const scorePct = {};
  for (const [s, v] of Object.entries(scores)) {
    scorePct[s] = totalScore > 0 ? Math.round((v / totalScore) * 100) : 0;
  }

  // Pick specific term within season using dominance + secondary season
  const terms = solarTerms[topSeason];
  const seasons = ['spring', 'summer', 'autumn', 'winter'];
  const sortedSeasons = seasons.filter(s => s !== topSeason).sort((a, b) => scores[b] - scores[a]);
  const secondSeason = sortedSeasons[0];
  const thirdSeason = sortedSeasons[1];
  const topPct = scorePct[topSeason];
  const secondPct = scorePct[secondSeason];
  const thirdPct = scorePct[thirdSeason];

  let termIndex;
  const mappings = {
    spring: () => {
      if (secondSeason === 'winter') return 0;
      if (topPct < 35) return 1;
      if (topPct > 50 && secondPct < 18 && thirdPct < 15) return 2;
      if (topPct >= 35 && topPct <= 50 && Math.abs(secondPct - thirdPct) < 10) return 3;
      if (secondSeason === 'autumn') return 4;
      if (secondSeason === 'summer') return 5;
      return 1;
    },
    summer: () => {
      if (secondSeason === 'spring') return 0;
      if (topPct < 35) return 1;
      if (topPct > 45 && secondSeason === 'autumn') return 2;
      if (topPct > 55) return 3;
      if (secondSeason === 'winter') return 4;
      if (topPct > 45 && secondPct > 18) return 5;
      return 1;
    },
    autumn: () => {
      if (secondSeason === 'summer') return 0;
      if (topPct < 35) return 1;
      if (secondSeason === 'winter' && topPct > 40) return 2;
      if (topPct >= 35 && topPct <= 48 && Math.abs(secondPct - thirdPct) < 12) return 3;
      if (topPct > 50) return 4;
      if (secondSeason === 'spring') return 5;
      return 1;
    },
    winter: () => {
      if (secondSeason === 'autumn') return 0;
      if (topPct < 35) return 1;
      if (secondSeason === 'spring') return 2;
      if (topPct > 55 && secondPct < 18) return 3;
      if (secondSeason === 'summer') return 4;
      if (topPct > 45) return 5;
      return 1;
    }
  };
  termIndex = (mappings[topSeason] || (() => 0))();

  let accuracy = 'high';
  if (quizMode === 'simple') accuracy = 'medium';
  if (multiSelectCount > answers.length * 0.3) accuracy = 'low';

  return {
    season: topSeason, scores, scorePct,
    term: terms[termIndex], accuracy,
    multiSelectCount, totalQuestions: answers.length
  };
}

// ===== RESULT ILLUSTRATION (CSS plant replicating growth stage) =====
function renderResultIllustration(season, termIndex) {
  const container = document.getElementById('result-illustration');
  // Map season + termIndex to growth stage (0-23)
  const seasonStart = { spring: 0, summer: 6, autumn: 12, winter: 18 };
  const stage = seasonStart[season] + termIndex;

  // Build a mini version of the growth scene for the result
  const stageInfo = getStageVisuals(stage, season, termIndex);
  container.innerHTML = stageInfo;
}

function getStageVisuals(stage, season, termIndex) {
  // Return inline SVG or CSS HTML for the specific growth stage
  const stemColors = { spring: '#6b9b4f', summer: '#5a8a3e', autumn: '#8b7355', winter: '#8b7355' };
  const leafColors = { spring: '#7bab5b', summer: '#5a8a3e', autumn: '#c9984a', winter: 'transparent' };
  const stemColor = stemColors[season];
  const leafColor = leafColors[season];

  // Generate a simple SVG illustration
  const svgParts = [];
  const cx = 50, cy = 70; // base of plant

  // Soil
  svgParts.push(`<ellipse cx="50" cy="88" rx="30" ry="5" fill="#c4a86c" opacity="0.6"/>`);
  svgParts.push(`<rect x="20" y="88" width="60" height="10" fill="#8b6914" rx="2"/>`);

  if (stage <= 5) {
    // Spring: seed → sprout
    const prog = stage / 5;
    const stemH = prog * 30;
    if (stage <= 1) {
      svgParts.push(`<ellipse cx="50" cy="84" rx="${6 - stage}" ry="${4 - stage * 1.5}" fill="#a07828"/>`);
    }
    if (stage >= 2) {
      svgParts.push(`<line x1="50" y1="${84 - stemH}" x2="50" y2="84" stroke="${stemColor}" stroke-width="2" stroke-linecap="round"/>`);
    }
    if (stage >= 3) {
      svgParts.push(`<ellipse cx="44" cy="${78 - stemH * 0.5}" rx="8" ry="4" fill="${leafColor}" transform="rotate(-30 44 ${78 - stemH * 0.5})"/>`);
    }
    if (stage >= 4) {
      svgParts.push(`<ellipse cx="56" cy="${72 - stemH * 0.4}" rx="8" ry="4" fill="${leafColor}" transform="rotate(30 56 ${72 - stemH * 0.4})"/>`);
    }
    if (stage === 1) {
      svgParts.push(`<circle cx="48" cy="80" r="2" fill="rgba(180,210,240,0.7)"/>`);
    }
  } else if (stage <= 11) {
    // Summer: full plant → flower → fruit
    const prog = (stage - 6) / 5;
    svgParts.push(`<line x1="50" y1="40" x2="50" y2="84" stroke="${stemColor}" stroke-width="2.5" stroke-linecap="round"/>`);
    // Leaves
    svgParts.push(`<ellipse cx="42" cy="72" rx="10" ry="5" fill="${leafColor}" transform="rotate(-25 42 72)"/>`);
    svgParts.push(`<ellipse cx="58" cy="64" rx="10" ry="5" fill="${leafColor}" transform="rotate(25 58 64)"/>`);
    svgParts.push(`<ellipse cx="40" cy="56" rx="9" ry="4" fill="${leafColor}" transform="rotate(-30 40 56)"/>`);
    svgParts.push(`<ellipse cx="60" cy="48" rx="9" ry="4" fill="${leafColor}" transform="rotate(30 60 48)"/>`);
    // Flower
    if (stage >= 8 && stage <= 10) {
      const flowerScale = stage === 10 ? 1 : 0.6;
      svgParts.push(`<circle cx="50" cy="38" r="${6 * flowerScale}" fill="#f0a0b0" opacity="0.9"/>`);
      svgParts.push(`<circle cx="50" cy="38" r="${2.5 * flowerScale}" fill="#f5d34a"/>`);
    }
    // Fruit
    if (stage >= 11) {
      svgParts.push(`<circle cx="52" cy="42" r="5" fill="#d4735e"/>`);
    }
  } else if (stage <= 17) {
    // Autumn: yellowing, fruit, leaves falling
    const prog = (stage - 12) / 5;
    const leafCol = prog > 0.4 ? '#c9984a' : leafColor;
    svgParts.push(`<line x1="50" y1="42" x2="50" y2="84" stroke="${prog > 0.6 ? '#8b7355' : stemColor}" stroke-width="2.5" stroke-linecap="round"/>`);
    if (stage < 15) {
      svgParts.push(`<ellipse cx="42" cy="70" rx="9" ry="4" fill="${leafCol}" transform="rotate(-25 42 70)" opacity="${stage > 13 ? 0.6 : 1}"/>`);
      svgParts.push(`<ellipse cx="58" cy="62" rx="9" ry="4" fill="${leafCol}" transform="rotate(25 58 62)" opacity="${stage > 14 ? 0.4 : 1}"/>`);
    }
    if (stage < 16) {
      svgParts.push(`<ellipse cx="40" cy="54" rx="8" ry="3" fill="${leafCol}" transform="rotate(-30 40 54)" opacity="${stage > 14 ? 0.3 : 1}"/>`);
    }
    // Fruit
    if (stage <= 16) {
      svgParts.push(`<circle cx="52" cy="44" r="${stage === 16 ? 6 : 5}" fill="#d4735e" opacity="${stage >= 17 ? 0.3 : 0.9}"/>`);
    }
    // Dew at 白露 (stage 14)
    if (stage === 14) {
      svgParts.push(`<circle cx="44" cy="68" r="2.5" fill="rgba(180,210,240,0.7)"/>`);
    }
    // Falling leaves
    if (stage >= 16) {
      svgParts.push(`<ellipse cx="35" cy="58" rx="7" ry="3" fill="#c9984a" transform="rotate(45 35 58)" opacity="0.6"/>`);
    }
  } else {
    // Winter: bare branches, snow
    const prog = (stage - 18) / 5;
    svgParts.push(`<line x1="50" y1="44" x2="50" y2="84" stroke="#8b7355" stroke-width="2.5" stroke-linecap="round"/>`);
    // Bare twigs
    svgParts.push(`<line x1="50" y1="56" x2="40" y2="52" stroke="#8b7355" stroke-width="1.5" stroke-linecap="round"/>`);
    svgParts.push(`<line x1="50" y1="50" x2="58" y2="46" stroke="#8b7355" stroke-width="1.5" stroke-linecap="round"/>`);
    // Snow on ground
    const snowH = prog * 25;
    if (snowH > 0) {
      svgParts.push(`<rect x="22" y="${88 - snowH}" width="56" height="${snowH}" fill="#e8eef4" rx="3" opacity="0.8"/>`);
    }
    // Snow on branches
    if (prog > 0.3) {
      svgParts.push(`<line x1="38" y1="50" x2="42" y2="50" stroke="#e8eef4" stroke-width="3" stroke-linecap="round" opacity="${Math.min(prog, 0.8)}"/>`);
    }
    // Seed underground at 大寒 (stage 23)
    if (stage === 23) {
      svgParts.push(`<ellipse cx="50" cy="86" rx="4" ry="3" fill="#a07828" opacity="0.6"/>`);
    }
  }

  return `<svg viewBox="0 0 100 100" width="100" height="100">${svgParts.join('')}</svg>`;
}

// ===== SHOW RESULT =====
function showResult() {
  const result = calculateResult();
  const t = result.term;

  document.getElementById('quiz-progress-fill').style.width = '100%';

  // Accuracy badge
  const accEl = document.getElementById('result-accuracy');
  const accLabels = {
    high: { text: '🎯 结果较准确', bg: '#e8f0e3', color: '#5b8c5a' },
    medium: { text: '📋 结果供参考', bg: '#fef9f0', color: '#b8860b' },
    low: { text: '💬 仅供参考娱乐', bg: '#fdf5f5', color: '#b5343a' }
  };
  const acc = accLabels[result.accuracy];
  accEl.textContent = acc.text; accEl.style.background = acc.bg; accEl.style.color = acc.color;

  // Badge
  document.getElementById('result-badge').textContent = t.badge;
  document.getElementById('result-badge').style.background = t.badgeBg;
  document.getElementById('result-badge').style.color = t.badgeColor;

  // Name
  document.getElementById('result-name').textContent = t.name;
  document.getElementById('result-name').style.color = t.color;
  document.getElementById('result-sub').textContent = t.sub;

  // Traits
  document.getElementById('result-traits').innerHTML = t.traits.map(tr =>
    `<span class="result-trait" style="background:${t.traitBg};color:${t.traitColor}">${tr}</span>`
  ).join('');

  // Description + poem
  document.getElementById('result-desc').textContent = t.desc;
  document.getElementById('result-poem').textContent = t.poem;

  // Illustration
  const seasonStart = { spring: 0, summer: 6, autumn: 12, winter: 18 };
  const allTerms = [...solarTerms.spring, ...solarTerms.summer, ...solarTerms.autumn, ...solarTerms.winter];
  const termGlobalIndex = allTerms.findIndex(term => term.name === t.name);
  const termIdx = termGlobalIndex - seasonStart[result.season];
  document.getElementById('result-illustration').innerHTML = getStageVisuals(termGlobalIndex, result.season, termIdx);

  // Distribution
  const seasonNames = { spring: '🌸 春', summer: '🔥 夏', autumn: '🍁 秋', winter: '❄️ 冬' };
  document.getElementById('result-distribution').innerHTML = `
    <div class="result-distribution-title">你的四季气质分布</div>
    ${['spring', 'summer', 'autumn', 'winter'].map(s => `
      <div class="dist-bar-wrap">
        <span class="dist-bar-label">${seasonNames[s]}</span>
        <div class="dist-bar-track">
          <div class="dist-bar-fill ${s}" style="width: ${result.scorePct[s]}%"></div>
        </div>
        <span class="dist-bar-pct">${result.scorePct[s]}%</span>
      </div>
    `).join('')}
  `;

  window._quizResult = result;
  showScreen('result');
}

// ===== SHARE =====
function shareResult() {
  const r = window._quizResult;
  if (!r) return;
  const t = r.term;
  const modeLabel = quizMode === 'simple' ? '精简版' : '详细版';
  const shareText = `我在「节气性格测试」${modeLabel}中测出最像【${t.name}】！\n\n${t.desc.substring(0, 80)}……\n\n快来测测你最像哪个节气吧！`;

  if (navigator.share) {
    navigator.share({ title: '测测你最像24节气中的哪个节气', text: shareText }).catch(() => {});
  } else {
    navigator.clipboard.writeText(shareText).then(() => {
      showToast('✅ 结果已复制，粘贴分享给朋友吧！');
    }).catch(() => { showToast('📋 分享内容已准备好，请手动复制～'); });
  }
}

function retakeQuiz() {
  currentQuestion = 0;
  answers = [];
  selectedOptions = new Set();
  isMultiSelect = false;
  quizMode = null;
  questionSet = [];
  showScreen('home');
  // Reset seed animation
  document.getElementById('home-seed').classList.remove('dropping');
}

// ===== TOAST =====
function showToast(msg) {
  const existing = document.querySelector('.toast');
  if (existing) existing.remove();
  const toast = document.createElement('div');
  toast.className = 'toast';
  toast.textContent = msg;
  document.body.appendChild(toast);
  setTimeout(() => toast.remove(), 2200);
}

// ===== KEYBOARD =====
document.addEventListener('keydown', (e) => {
  const quizScreen = document.getElementById('screen-quiz');
  if (!quizScreen.classList.contains('active')) return;
  if (e.key >= '1' && e.key <= '4') {
    const idx = parseInt(e.key) - 1;
    const opt = document.querySelector(`.quiz-option[data-idx="${idx}"]`);
    if (opt) selectOption(idx, opt);
  } else if (e.key === 'Enter') {
    e.preventDefault();
    nextQuestion();
  } else if (e.key === 'm' || e.key === 'M') {
    toggleMultiSelect();
  }
});
